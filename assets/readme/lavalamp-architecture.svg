<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="lava" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b2b"/>
      <stop offset="0.5" stop-color="#ff8c42"/>
      <stop offset="1" stop-color="#ff6b2b"/>
    </linearGradient>
    <linearGradient id="lavaV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b2b"/>
      <stop offset="1" stop-color="#c43e00"/>
    </linearGradient>
    <filter id="glowL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#161b22" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="640" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Header -->
  <text x="40" y="48" fill="#c9d1d9" font-size="22" font-weight="600">Project Lavalamp</text>
  <text x="40" y="72" fill="#8b949e" font-size="13">hardware-level mitigation for the AMD Zen 5 SMT port contention side-channel</text>
  <text x="1160" y="48" fill="#ff6b2b" font-size="12" text-anchor="end" letter-spacing="2">GTC ENTROPY ENGINE</text>

  <line x1="40" y1="94" x2="1160" y2="94" stroke="#21262d" stroke-width="1"/>

  <!-- Attack flow: attacker -> CPU -> dither -> clean signal -->
  <g transform="translate(40,130)">
    <!-- Victim CPU box -->
    <rect x="0" y="0" width="280" height="120" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="140" y="22" text-anchor="middle" fill="#8b949e" font-size="10" letter-spacing="1.5">VICTIM WORKLOAD</text>
    <text x="140" y="52" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="600">AMD Zen 5 · SMT</text>
    <text x="140" y="76" text-anchor="middle" fill="#8b949e" font-size="11">constant-time crypto</text>
    <text x="140" y="102" text-anchor="middle" fill="#f85149" font-size="10">⚠ 27.6% timing leak via port contention</text>

    <!-- raw signal wave -->
    <g transform="translate(300,60)">
      <path d="M 0 0 L 20 0 L 24 -18 L 32 18 L 40 -14 L 50 0 L 70 0" stroke="#f85149" stroke-width="2" fill="none"/>
      <text x="35" y="38" text-anchor="middle" fill="#f85149" font-size="9" letter-spacing="1">LEAK</text>
    </g>

    <!-- GTC engine -->
    <rect x="390" y="0" width="280" height="120" rx="6" fill="#1a1008" stroke="#ff6b2b" stroke-width="1.5"/>
    <text x="530" y="22" text-anchor="middle" fill="#ff6b2b" font-size="10" letter-spacing="1.5">GTC DITHER ENGINE</text>
    <text x="530" y="52" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="600">Goldbach Topological</text>
    <text x="530" y="72" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="600">Calculator</text>
    <text x="530" y="98" text-anchor="middle" fill="#8b949e" font-size="10">Shannon · Curvature · prime partitions</text>

    <!-- mixer -->
    <g transform="translate(690,60)">
      <circle r="18" fill="#0d1117" stroke="url(#lava)" stroke-width="2" filter="url(#glowL)"/>
      <text y="6" text-anchor="middle" fill="#ff6b2b" font-size="22" font-weight="700">⊕</text>
      <text y="38" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="1">MASK</text>
    </g>

    <!-- Output clean signal -->
    <rect x="730" y="0" width="310" height="120" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="885" y="22" text-anchor="middle" fill="#8b949e" font-size="10" letter-spacing="1.5">OBSERVED TIMING</text>
    <text x="885" y="56" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="600">signal ≤ detection floor</text>
    <g transform="translate(790,76)">
      <path d="M 0 0 L 200 0" stroke="#3fb950" stroke-width="2" fill="none" stroke-dasharray="3 3"/>
    </g>
    <text x="885" y="102" text-anchor="middle" fill="#3fb950" font-size="11">93–99% leakage reduction</text>

    <!-- connecting lines -->
    <line x1="280" y1="60" x2="300" y2="60" stroke="#f85149" stroke-width="2"/>
    <line x1="370" y1="60" x2="390" y2="60" stroke="#f85149" stroke-width="2"/>
    <line x1="670" y1="60" x2="672" y2="60" stroke="#ff6b2b" stroke-width="2"/>
    <line x1="708" y1="60" x2="730" y2="60" stroke="#3fb950" stroke-width="2"/>
  </g>

  <!-- Divider -->
  <line x1="40" y1="290" x2="1160" y2="290" stroke="#21262d" stroke-width="1"/>
  <text x="40" y="318" fill="#8b949e" font-size="11" letter-spacing="1.5">THREE DEPLOYMENT TIERS</text>

  <!-- Tier 1: Shield -->
  <g transform="translate(40,340)">
    <rect x="0" y="0" width="360" height="260" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="0" y="0" width="360" height="4" rx="2" fill="url(#lava)"/>
    <text x="24" y="38" fill="#ff6b2b" font-size="10" letter-spacing="2">TIER 01</text>
    <text x="24" y="68" fill="#c9d1d9" font-size="22" font-weight="600">Shield</text>
    <text x="24" y="90" fill="#8b949e" font-size="11">CPU-only software daemon</text>

    <line x1="24" y1="108" x2="336" y2="108" stroke="#21262d"/>

    <g font-size="11" fill="#c9d1d9">
      <text x="24" y="134">· Any x86 or ARM server w/ SMT</text>
      <text x="24" y="156">· 93% leak reduction</text>
      <text x="24" y="178">· 6% CPU overhead</text>
      <text x="24" y="200">· Zero hardware required</text>
    </g>
    <text x="24" y="232" fill="#ff6b2b" font-size="13" font-weight="600">$99–299 / yr</text>
  </g>

  <!-- Tier 2: Lite -->
  <g transform="translate(420,340)">
    <rect x="0" y="0" width="360" height="260" rx="8" fill="#161b22" stroke="#ff6b2b" stroke-width="1.5"/>
    <rect x="0" y="0" width="360" height="4" rx="2" fill="url(#lava)"/>
    <text x="24" y="38" fill="#ff6b2b" font-size="10" letter-spacing="2">TIER 02</text>
    <text x="24" y="68" fill="#c9d1d9" font-size="22" font-weight="600">Lite</text>
    <text x="24" y="90" fill="#8b949e" font-size="11">USB FPGA bitstream + host daemon</text>

    <line x1="24" y1="108" x2="336" y2="108" stroke="#21262d"/>

    <g font-size="11" fill="#c9d1d9">
      <text x="24" y="134">· 7+ Artix-7 boards: Arty, Basys, Nexys,</text>
      <text x="24" y="150">  Neso, AtomMiner AM01</text>
      <text x="24" y="172">· 99%+ leak reduction</text>
      <text x="24" y="194">· &lt;1% CPU overhead</text>
      <text x="24" y="216">· Hardware-bound Goldbach DRM</text>
    </g>
    <text x="24" y="246" fill="#ff6b2b" font-size="13" font-weight="600">$499–999 / yr</text>
  </g>

  <!-- Tier 3: Pro -->
  <g transform="translate(800,340)">
    <rect x="0" y="0" width="360" height="260" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="0" y="0" width="360" height="4" rx="2" fill="url(#lava)"/>
    <text x="24" y="38" fill="#ff6b2b" font-size="10" letter-spacing="2">TIER 03</text>
    <text x="24" y="68" fill="#c9d1d9" font-size="22" font-weight="600">Pro</text>
    <text x="24" y="90" fill="#8b949e" font-size="11">PCIe FPGA + kernel driver</text>

    <line x1="24" y1="108" x2="336" y2="108" stroke="#21262d"/>

    <g font-size="11" fill="#c9d1d9">
      <text x="24" y="134">· NiteFury M.2, Kintex-7, Alveo U50</text>
      <text x="24" y="156">· Real-time PCIe TLP inference</text>
      <text x="24" y="178">· AES-GCM encrypted DMA dither</text>
      <text x="24" y="200">· Lowest latency tier</text>
    </g>
    <text x="24" y="232" fill="#ff6b2b" font-size="13" font-weight="600">$2k–5k / yr</text>
    <text x="336" y="232" text-anchor="end" fill="#8b949e" font-size="10" font-style="italic">in development</text>
  </g>
</svg>
