<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6900"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="560" fill="none" stroke="#21262d" stroke-width="1"/>

  <text x="40" y="48" fill="#c9d1d9" font-size="22" font-weight="600" letter-spacing="0.5">opentine</text>
  <text x="40" y="72" fill="#8b949e" font-size="13">git for agent runs — content-addressed, forkable, replayable</text>
  <text x="1160" y="48" fill="#FF6900" font-size="12" text-anchor="end" letter-spacing="2">RUN TREE</text>

  <line x1="40" y1="94" x2="1160" y2="94" stroke="#21262d" stroke-width="1"/>

  <!-- Root -->
  <g transform="translate(100,150)">
    <circle r="14" fill="#0d1117" stroke="url(#orange)" stroke-width="2.5" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#FF6900" font-size="14" font-weight="700">◆</text>
    <text x="0" y="-26" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">run_a3f8</text>
    <text x="0" y="40" text-anchor="middle" fill="#8b949e" font-size="10">root</text>
  </g>

  <!-- Main timeline path -->
  <path d="M 114 150 L 230 150" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <path d="M 258 150 L 374 150" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <path d="M 402 150 L 518 150" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <path d="M 546 150 L 662 150" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <path d="M 690 150 L 806 150" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <path d="M 834 150 L 950 150" stroke="#58a6ff" stroke-width="2" fill="none"/>

  <!-- Main steps -->
  <g font-size="11" fill="#c9d1d9">
    <g transform="translate(244,150)">
      <rect x="-28" y="-16" width="56" height="32" rx="4" fill="#161b22" stroke="#30363d"/>
      <text y="-22" text-anchor="middle" fill="#8b949e" font-size="9">step 1</text>
      <text y="4" text-anchor="middle" fill="#58a6ff">think</text>
    </g>
    <g transform="translate(388,150)">
      <rect x="-28" y="-16" width="56" height="32" rx="4" fill="#161b22" stroke="#30363d"/>
      <text y="-22" text-anchor="middle" fill="#8b949e" font-size="9">step 2</text>
      <text y="4" text-anchor="middle" fill="#c9d1d9">search</text>
    </g>
    <g transform="translate(532,150)">
      <rect x="-28" y="-16" width="56" height="32" rx="4" fill="#161b22" stroke="#30363d"/>
      <text y="-22" text-anchor="middle" fill="#8b949e" font-size="9">step 3</text>
      <text y="4" text-anchor="middle" fill="#58a6ff">think</text>
    </g>
    <g transform="translate(676,150)">
      <rect x="-28" y="-16" width="56" height="32" rx="4" fill="#161b22" stroke="#30363d"/>
      <text y="-22" text-anchor="middle" fill="#8b949e" font-size="9">step 4</text>
      <text y="4" text-anchor="middle" fill="#c9d1d9">fetch</text>
    </g>
    <g transform="translate(820,150)">
      <rect x="-28" y="-16" width="56" height="32" rx="4" fill="#161b22" stroke="#30363d"/>
      <text y="-22" text-anchor="middle" fill="#8b949e" font-size="9">step 5</text>
      <text y="4" text-anchor="middle" fill="#58a6ff">think</text>
    </g>
    <g transform="translate(964,150)">
      <rect x="-28" y="-16" width="56" height="32" rx="4" fill="#58a6ff" stroke="#58a6ff"/>
      <text y="-22" text-anchor="middle" fill="#8b949e" font-size="9">step 6</text>
      <text y="4" text-anchor="middle" fill="#0d1117" font-weight="700">done</text>
    </g>
  </g>

  <text x="964" y="200" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic">completed</text>

  <!-- Fork arrow from step 2 -->
  <path d="M 388 166 Q 388 240 460 280 L 560 320" stroke="#FF6900" stroke-width="2" fill="none" stroke-dasharray="0" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FF6900"/>
    </marker>
  </defs>

  <text x="408" y="230" fill="#FF6900" font-size="10" font-style="italic">fork from step 2</text>

  <!-- Forked branch -->
  <g transform="translate(580,340)">
    <circle r="12" fill="#0d1117" stroke="url(#orange)" stroke-width="2.5" filter="url(#glow)"/>
    <text x="0" y="4" text-anchor="middle" fill="#FF6900" font-size="12" font-weight="700">◆</text>
    <text x="0" y="-22" text-anchor="middle" fill="#FF6900" font-size="11" font-weight="600">run_b7c1</text>
    <text x="0" y="36" text-anchor="middle" fill="#8b949e" font-size="9">forked</text>
  </g>

  <path d="M 592 340 L 692 340" stroke="#FF6900" stroke-width="2" fill="none"/>
  <path d="M 720 340 L 820 340" stroke="#FF6900" stroke-width="2" fill="none"/>
  <path d="M 848 340 L 948 340" stroke="#FF6900" stroke-width="2" fill="none"/>

  <g font-size="11">
    <g transform="translate(706,340)">
      <rect x="-26" y="-15" width="52" height="30" rx="4" fill="#1a1008" stroke="#FF6900" stroke-width="1.2"/>
      <text y="-21" text-anchor="middle" fill="#8b949e" font-size="9">step 2'</text>
      <text y="4" text-anchor="middle" fill="#FF6900">search*</text>
    </g>
    <g transform="translate(834,340)">
      <rect x="-26" y="-15" width="52" height="30" rx="4" fill="#1a1008" stroke="#FF6900" stroke-width="1.2"/>
      <text y="-21" text-anchor="middle" fill="#8b949e" font-size="9">step 3</text>
      <text y="4" text-anchor="middle" fill="#FF6900">think</text>
    </g>
    <g transform="translate(962,340)">
      <rect x="-26" y="-15" width="52" height="30" rx="4" fill="#FF6900" stroke="#FF6900"/>
      <text y="-21" text-anchor="middle" fill="#8b949e" font-size="9">step 4</text>
      <text y="4" text-anchor="middle" fill="#0d1117" font-weight="700">done</text>
    </g>
  </g>

  <text x="706" y="386" fill="#FF6900" font-size="9" font-style="italic">*different query</text>

  <!-- Bottom stats -->
  <line x1="40" y1="450" x2="1160" y2="450" stroke="#21262d" stroke-width="1"/>

  <g font-size="11" fill="#8b949e">
    <g transform="translate(80,490)">
      <text y="0" fill="#FF6900" font-size="10" letter-spacing="1.5">FORK</text>
      <text y="22" fill="#c9d1d9">tine fork run_a3f8 --from-step 2</text>
    </g>
    <g transform="translate(440,490)">
      <text y="0" fill="#FF6900" font-size="10" letter-spacing="1.5">REPLAY</text>
      <text y="22" fill="#c9d1d9">tine replay run_b7c1 --from-step 3</text>
    </g>
    <g transform="translate(820,490)">
      <text y="0" fill="#FF6900" font-size="10" letter-spacing="1.5">DIFF</text>
      <text y="22" fill="#c9d1d9">tine diff run_a3f8 run_b7c1</text>
    </g>
  </g>

  <text x="1160" y="540" text-anchor="end" fill="#484f58" font-size="10">~250 LOC · any model · zero lock-in</text>
</svg>
